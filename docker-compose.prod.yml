services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-baby_enxoval}
      POSTGRES_USER: ${POSTGRES_USER:-baby}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-baby}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-baby} -d ${POSTGRES_DB:-baby_enxoval}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env.example
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-baby}:${POSTGRES_PASSWORD:-baby}@postgres:5432/${POSTGRES_DB:-baby_enxoval}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-refresh-secret}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3333:3333"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3333/api}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3333/api}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:
