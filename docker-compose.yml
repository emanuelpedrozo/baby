services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-baby_enxoval}
      POSTGRES_USER: ${POSTGRES_USER:-baby}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-baby}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-baby} -d ${POSTGRES_DB:-baby_enxoval}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-baby}:${POSTGRES_PASSWORD:-baby}@postgres:5432/${POSTGRES_DB:-baby_enxoval}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3333:3333"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm run start:dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env.example
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  minio_data:
  backend_node_modules:
  frontend_node_modules:
